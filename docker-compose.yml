version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: drone_postgres
    environment:
      POSTGRES_USER: livestock_user
      POSTGRES_PASSWORD: livestock_password
      POSTGRES_DB: drone_livestock_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livestock_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone_network

  # PgAdmin (Database UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: drone_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - drone_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: drone_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: drone_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - drone_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: drone_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - drone_network

  # Vault (Secret Management)
  vault:
    image: vault:latest
    container_name: drone_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - drone_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: drone_api
    environment:
      DATABASE_URL: postgresql+asyncpg://livestock_user:livestock_password@postgres:5432/drone_livestock_db
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      VAULT_ADDR: http://vault:8200
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      WORKERS: 1
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      vault:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - drone_network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: drone_prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - drone_network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: drone_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - drone_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  drone_network:
    driver: bridge
