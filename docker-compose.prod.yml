version: '3.9'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: drone_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: drone_livestock_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis Cache (Production)
  redis:
    image: redis:7-alpine
    container_name: drone_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # MinIO Object Storage (Production)
  minio:
    image: minio/minio:latest
    container_name: drone_minio_prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    restart: always
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - drone_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Qdrant Vector Database (Production)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: drone_qdrant_prod
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - drone_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # FastAPI Application (Production)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: drone_api_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/drone_livestock_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_URL: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      WORKERS: 4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: always
    networks:
      - drone_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: drone_nginx_prod
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always
    networks:
      - drone_network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: drone_prometheus_prod
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: always
    networks:
      - drone_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  prometheus_data:

networks:
  drone_network:
    driver: bridge
